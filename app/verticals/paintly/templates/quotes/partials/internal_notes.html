<div id="internal-notes-block" class="rounded-[26px] border border-slate-200/70 bg-white p-5 shadow-sm space-y-3">
  <div class="text-xs font-semibold uppercase tracking-[0.14em] text-slate-400">Interne notities</div>
  <p class="text-xs text-slate-500">Alleen zichtbaar voor jouw team, niet op de publieke offerte.</p>
  <form class="space-y-2"
        hx-post="/app/tenants/{{ lead.tenant_id }}/quotes/{{ lead.id }}/partials/internal-notes"
        hx-target="#internal-notes-block"
        hx-swap="outerHTML"
        hx-disabled-elt="button[type=submit]"
        hx-indicator="#notes-indicator-{{ lead.id }}">
    <textarea name="internal_notes"
              rows="4"
              class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-800 outline-none focus:border-sky-300 focus:ring-2 focus:ring-sky-100"
              placeholder="Interne afspraken, vervolg, marge…">{{ internal_notes }}</textarea>
    <div class="flex items-center gap-3">
      <button type="submit"
              class="inline-flex h-9 items-center justify-center gap-2 rounded-xl bg-slate-900 px-4 text-sm font-medium text-white shadow-sm transition hover:bg-slate-800 disabled:opacity-60">
        <span id="notes-indicator-{{ lead.id }}" class="htmx-indicator inline-flex h-4 w-4 items-center justify-center">
          <svg class="h-4 w-4 animate-spin" fill="none" viewBox="0 0 24 24" aria-hidden="true">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </span>
        Opslaan
      </button>
      <span class="text-xs text-slate-400">Wordt opgeslagen op de server</span>
    </div>
  </form>
</div>
