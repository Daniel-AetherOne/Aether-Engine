{% extends "app/layout.html" %}
{% block content %}

<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="mb-8 flex justify-center">
      <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-sky-500 text-white shadow-sm">
        <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/>
        </svg>
      </div>
    </div>

    <!-- Card -->
    <div class="overflow-hidden rounded-[28px] border border-slate-200/70 bg-white shadow-sm">

      <!-- Header -->
      <div class="border-b border-slate-100 px-8 py-6 text-center">
        <h1 class="text-xl font-semibold tracking-tight text-slate-900">Account aanmaken</h1>
        <p class="mt-1 text-sm text-slate-500">Stel je bedrijf en prijsinstellingen in</p>
      </div>

      <!-- Form -->
      <div class="px-8 py-6">
        <form method="post" action="/auth/register" class="space-y-5">

          <!-- Company Name -->
          <div>
            <label for="company_name" class="mb-2 block text-xs font-semibold uppercase tracking-[0.14em] text-slate-400">
              Bedrijfsnaam
            </label>
            <div class="relative">
              <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                </svg>
              </div>
              <input
                id="company_name"
                name="company_name"
                type="text"
                required
                placeholder="Bijv. Jansen Schilderwerken"
                class="h-11 w-full rounded-xl border border-slate-200 bg-white pl-10 pr-3 text-sm text-slate-700 outline-none transition focus:border-slate-300 focus:ring-2 focus:ring-slate-100"
              >
            </div>
          </div>

          <!-- Email -->
          <div>
            <label for="email" class="mb-2 block text-xs font-semibold uppercase tracking-[0.14em] text-slate-400">
              E-mailadres
            </label>
            <div class="relative">
              <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
                </svg>
              </div>
              <input
                id="email"
                name="email"
                type="email"
                required
                placeholder="jij@bedrijf.nl"
                class="h-11 w-full rounded-xl border border-slate-200 bg-white pl-10 pr-3 text-sm text-slate-700 outline-none transition focus:border-slate-300 focus:ring-2 focus:ring-slate-100"
              >
            </div>
          </div>

          <!-- Phone -->
          <div>
            <label for="phone" class="mb-2 block text-xs font-semibold uppercase tracking-[0.14em] text-slate-400">
              Telefoon
            </label>
            <div class="relative">
              <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.95.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.129a11.042 11.042 0 005.516 5.516l1.129-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.95V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                </svg>
              </div>
              <input
                id="phone"
                name="phone"
                type="text"
                placeholder="+31 6 12345678"
                class="h-11 w-full rounded-xl border border-slate-200 bg-white pl-10 pr-3 text-sm text-slate-700 outline-none transition focus:border-slate-300 focus:ring-2 focus:ring-slate-100"
              >
            </div>
          </div>

          <!-- Wall Rate -->
          <div>
            <label for="walls_rate_eur_per_sqm" class="mb-2 block text-xs font-semibold uppercase tracking-[0.14em] text-slate-400">
              Wandtarief (€ per m²)
            </label>
            <div class="relative">
              <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-2.21 0-4 .895-4 2s1.79 2 4 2 4 .895 4 2-1.79 2-4 2m0-10v12m0-12c1.657 0 3 .672 3 1.5M12 8c-1.657 0-3 .672-3 1.5"/>
                </svg>
              </div>
              <input
                id="walls_rate_eur_per_sqm"
                name="walls_rate_eur_per_sqm"
                type="number"
                step="0.01"
                min="0.01"
                required
                placeholder="40"
                class="h-11 w-full rounded-xl border border-slate-200 bg-white pl-10 pr-3 text-sm text-slate-700 outline-none transition focus:border-slate-300 focus:ring-2 focus:ring-slate-100"
              >
            </div>
          </div>

          <!-- Password -->
          <div>
            <label for="password" class="mb-2 block text-xs font-semibold uppercase tracking-[0.14em] text-slate-400">
              Wachtwoord
            </label>
            <div class="relative">
              <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
              </div>
              <input
                id="password"
                name="password"
                type="password"
                required
                placeholder="••••••••"
                class="h-11 w-full rounded-xl border border-slate-200 bg-white pl-10 pr-3 text-sm text-slate-700 outline-none transition focus:border-slate-300 focus:ring-2 focus:ring-slate-100"
              >
            </div>
            <p class="mt-1.5 text-xs text-slate-500">Moet minimaal 8 tekens bevatten</p>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            class="h-11 w-full rounded-xl bg-sky-500 px-4 text-sm font-semibold text-white shadow-sm transition hover:bg-sky-600 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:ring-offset-2"
          >
            Account aanmaken
          </button>
        </form>

        <!-- Divider -->
        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-slate-200"></div>
          </div>
          <div class="relative flex justify-center">
            <span class="bg-white px-2 text-xs text-slate-500">of</span>
          </div>
        </div>

        <!-- Login Link -->
        <p class="text-center text-sm text-slate-600">
          Heb je al een account?
          <a href="/auth/login" class="font-semibold text-sky-600 transition-colors hover:text-sky-700">
            Log in
          </a>
        </p>
      </div>
    </div>

    <!-- Footer -->
    <p class="mt-8 text-center text-xs text-slate-400">
      Door een account aan te maken ga je akkoord met onze
      <a href="#" class="underline hover:text-slate-600">voorwaarden</a>
      en
      <a href="#" class="underline hover:text-slate-600">privacyverklaring</a>.
    </p>

  </div>
</div>

{% endblock %}
