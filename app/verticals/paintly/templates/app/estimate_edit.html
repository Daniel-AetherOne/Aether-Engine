{% extends "app/layout.html" %}
{% block content %}

<div class="space-y-6">

  <!-- Header -->
  <div class="rounded-[28px] border border-slate-200/70 bg-white px-6 py-5 shadow-sm">
    <div class="flex flex-col gap-4 xl:flex-row xl:items-start xl:justify-between">
      <div>
        <a href="/app/leads/{{ lead.id }}" class="inline-flex items-center gap-1 text-sm font-medium text-slate-500 transition hover:text-slate-900">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 19l-7-7 7-7"/>
          </svg>
          Terug naar lead
        </a>

        <div class="mt-3 text-sm text-slate-400">Offerte</div>
        <h1 class="mt-1 text-[28px] font-semibold tracking-tight text-slate-900">Offerte bewerken</h1>
        <p class="mt-2 text-sm text-slate-500">Handmatige aanpassingen voor notities, korting en totaal.</p>
      </div>
    </div>
  </div>

  <!-- Form card -->
  <div class="rounded-[26px] border border-slate-200/70 bg-white p-6 shadow-sm">
    <form method="post" action="/app/leads/{{ lead.id }}/edit-estimate" class="space-y-6">

      <!-- Public notes -->
      <div>
        <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-slate-400">
          Publieke notities
        </label>
        <textarea
          name="public_notes"
          rows="6"
          class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-700 outline-none transition focus:border-slate-300 focus:ring-2 focus:ring-slate-100"
          placeholder="Voeg hier extra toelichting of opmerkingen toe voor de klant..."
        >{{ overrides.get('public_notes') or '' }}</textarea>
      </div>

      <!-- Inputs -->
      <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-slate-400">
            Korting (%)
          </label>
          <input
            name="discount_percent"
            type="number"
            min="0"
            max="100"
            step="0.1"
            value="{{ overrides.get('discount_percent') if overrides.get('discount_percent') is not none else '' }}"
            class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-700 outline-none transition focus:border-slate-300 focus:ring-2 focus:ring-slate-100"
            placeholder="Bijv. 10"
          />
        </div>

        <div>
          <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-slate-400">
            Handmatig totaal
          </label>
          <input
            name="manual_total"
            type="number"
            min="0"
            step="0.01"
            value="{{ overrides.get('manual_total') if overrides.get('manual_total') is not none else '' }}"
            class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-700 outline-none transition focus:border-slate-300 focus:ring-2 focus:ring-slate-100"
            placeholder="Optioneel"
          />
          <p class="mt-2 text-xs text-slate-400">
            Indien ingevuld, overschrijft dit het getoonde totaal.
          </p>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex flex-wrap items-center gap-3 pt-2">
        <button
          type="submit"
          class="inline-flex h-10 items-center justify-center rounded-xl bg-sky-500 px-4 text-sm font-medium text-white shadow-sm transition hover:bg-sky-600"
        >
          Wijzigingen opslaan
        </button>

        <a
          href="/app/leads/{{ lead.id }}"
          class="inline-flex h-10 items-center justify-center rounded-xl border border-slate-200 bg-white px-4 text-sm font-medium text-slate-600 transition hover:bg-slate-50 hover:text-slate-900"
        >
          Annuleren
        </a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
