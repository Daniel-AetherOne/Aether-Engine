<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI analyseert uw foto's — Paintly</title>

  <link rel="icon" href="https://offers.getpaintly.com/static/v1/favicon.ico">

  <style>
    :root {
      --bg: #0b1220;
      --card: rgba(17, 24, 39, 0.92);
      --card-border: rgba(148, 163, 184, 0.25);
      --text: #e5e7eb;
      --muted: rgba(229, 231, 235, 0.72);
      --accent: #38bdf8;
      --accent-2: #34d399;
      --danger: #f87171;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: radial-gradient(1200px circle at 50% 0%, rgba(56, 189, 248, 0.12), transparent 55%),
                  var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
      padding: 28px;
    }

    .header {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 10px 0 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .loader-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 3px solid rgba(56, 189, 248, 0.25);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
      flex: 0 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .rules {
      margin-top: 18px;
      padding: 16px 16px;
      background: rgba(2, 6, 23, 0.35);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px;
    }

    .rules-label {
      font-size: 12px;
      color: rgba(229, 231, 235, 0.7);
      margin: 0 0 8px 0;
    }

    ul {
      margin: 0;
      padding-left: 18px;
      color: rgba(229, 231, 235, 0.92);
      font-size: 14px;
      line-height: 1.6;
    }

    .error {
      display: none;
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid rgba(248, 113, 113, 0.35);
      background: rgba(248, 113, 113, 0.10);
    }

    .error-title {
      font-weight: 650;
      margin: 0 0 6px 0;
      color: rgba(248, 113, 113, 0.95);
    }

    .error-text {
      white-space: pre-wrap;
      word-break: break-word;
      color: rgba(229, 231, 235, 0.88);
      font-size: 13px;
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      color: rgba(229, 231, 235, 0.6);
      font-size: 12px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>

<body>
  <div class="card" role="status" aria-live="polite">
    <div class="header">
      <div>
        <h1 class="title">AI analyseert uw foto's...</h1>
        <p class="sub">Dit duurt meestal maar een paar seconden.</p>
      </div>
      <div class="loader-wrap" aria-hidden="true">
        <div class="spinner"></div>
        <div style="color: var(--muted); font-size: 14px;">Even geduld...</div>
      </div>
    </div>

    <div class="rules">
      <p class="rules-label">Regels</p>
      <ul>
        <li id="rule1">Oppervlak bepalen...</li>
        <li id="rule2">Voorbereiding inschatten...</li>
        <li id="rule3">Conceptofferte opstellen...</li>
      </ul>
    </div>

    <div class="error" id="errorBox">
      <div class="error-title">We konden je aanvraag niet verwerken</div>
      <div class="error-text" id="errorText"></div>
    </div>

    <div class="footer">Paintly • AI-gestuurde offertes</div>
  </div>

  <script>
    const leadId = String({{ lead_id | tojson }});
    const initKey = `processing_init_${leadId}`;

    const errorBox = document.getElementById("errorBox");
    const errorText = document.getElementById("errorText");

    function showFailed(msg) {
      if (errorBox) errorBox.style.display = "block";
      if (errorText) errorText.textContent = msg || "Onbekende fout";
    }

    function redirectToDone(data) {
      // Alleen redirect bij done, nooit naar een andere status-/loading-pagina.
      const url =
        (data && data.redirect_url) ? String(data.redirect_url) : "/thank-you";
      console.info("[processing] redirect trigger", { leadId, url });
      window.location.href = url;
    }

    async function fetchStatusOnce() {
      try {
        const res = await fetch(`/leads/${encodeURIComponent(leadId)}/status`, {
          method: "GET",
          headers: { "accept": "application/json" },
          cache: "no-store"
        });

        if (!res.ok) {
          return null;
        }

        return await res.json();
      } catch (_) {
        return null;
      }
    }

    let pollIntervalId = null;

    let isStopping = false;

    async function pollOnceAndAct() {
      const data = await fetchStatusOnce();
      if (!data) return;
      if (isStopping) return;

      const status = (data.status || "queued").toString();
      if (status === "done") {
        isStopping = true;
        stopPolling();
        redirectToDone(data);
        return;
      }

      if (status === "failed") {
        isStopping = true;
        stopPolling();
        showFailed(data.error || "Onbekende fout");
        return;
      }
    }

    function stopPolling() {
      if (pollIntervalId) {
        clearInterval(pollIntervalId);
        pollIntervalId = null;
      }
    }

    if (window[initKey]) {
      console.info("[processing] duplicate init skipped", { leadId });
    } else {
      window[initKey] = true;
      console.info("[processing] polling init", { leadId });

    // setInterval zoals gevraagd (elke 2 seconden)
      pollIntervalId = setInterval(pollOnceAndAct, 2000);

    // Meteen een eerste check (sneller UX)
      pollOnceAndAct();
    }
  </script>
</body>
</html>
